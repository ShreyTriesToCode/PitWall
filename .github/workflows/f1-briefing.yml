name: PitWall

on:
  schedule:
    - cron: "30 3 * * *"
    - cron: "0 */6 * * 4,5,6,0,1"
  workflow_dispatch:
    inputs:
      force_retrain:
        description: "Force retrain ML model"
        required: false
        default: "false"
      full_data_backfill_limit:
        description: "How many uncached full historical races to fetch this run; 0 means no artificial limit"
        required: false
        default: "0"
      lookahead_days:
        description: "How many days ahead to search for F1 calendar events"
        required: false
        default: "90"
      send_email:
        description: "Allow email system when notification gate opens"
        required: false
        default: "true"
      force_notify:
        description: "Force email and GitHub Issue notification even outside notification window"
        required: false
        default: "false"
      notification_window_hours:
        description: "Hours before matched event when email and issue notifications are allowed"
        required: false
        default: "8"
      output_mode:
        description: "auto = scheduled logic. weekend = Sprint + Race weekend. today = today's Sprint/Race. next = next Sprint/Race."
        required: false
        default: "auto"
      target_season:
        description: "Target F1 season, or auto"
        required: false
        default: "auto"
      target_event:
        description: "Optional event slug/name to focus ingestion"
        required: false
        default: ""
      target_session:
        description: "Optional session to focus ingestion"
        required: false
        default: ""
      force_session_ingest:
        description: "Bypass normal post-session wait windows"
        required: false
        default: "false"
      session_delay_minutes:
        description: "Generic post-session delay for non-specialized sessions"
        required: false
        default: "30"
      disable_live_mode:
        description: "Disable true live timing labels"
        required: false
        default: "false"
      use_social_upgrade_sources:
        description: "Allow low-confidence social upgrade sources"
        required: false
        default: "false"
      refresh_fia_documents:
        description: "Refresh FIA document index metadata"
        required: false
        default: "false"
      refresh_source_registry:
        description: "Refresh source registry discovery"
        required: false
        default: "false"
      run_frontend_build:
        description: "Run Next.js frontend build"
        required: false
        default: "true"
      dry_run_session_ingest:
        description: "Discover/check sessions without overwriting production contracts"
        required: false
        default: "false"
      force_reparse_fia_documents:
        description: "Reparse cached FIA text/PDF without forcing redownload"
        required: false
        default: "false"
      force_redownload_fia_documents:
        description: "Redownload FIA PDFs and reparse"
        required: false
        default: "false"
      enable_feature_ablation:
        description: "Run heavier feature ablation diagnostics"
        required: false
        default: "false"
      enable_hyperparameter_search:
        description: "Run heavier hyperparameter search"
        required: false
        default: "false"
      openf1_optional_only:
        description: "Treat OpenF1 as optional enrichment and fall back when authentication is required"
        required: false
        default: "true"

permissions:
  contents: write
  issues: write

concurrency:
  group: pitwall-${{ github.ref }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  PYTHONUNBUFFERED: "1"

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0
          lfs: true

      - name: Sync with remote before generation
        run: |
          git fetch origin main
          git checkout main
          git pull --ff-only origin main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "requirements.txt"

      - name: Restore runtime caches
        uses: actions/cache@v4
        with:
          path: |
            fastf1_cache
            data_cache/http
            data_cache/full_races
            data_cache/fia-documents
            data_cache/source_registry
            models/saved_models
          key: pitwall-runtime-cache-${{ runner.os }}-${{ hashFiles('f1_briefing.py', 'pitwall/**/*.py', 'scripts/validate_contracts.py', 'scripts/validate_cache_manifest.py', 'scripts/check_links.py', 'requirements.txt') }}
          restore-keys: |
            pitwall-runtime-cache-${{ runner.os }}-

      - name: Inspect restored runtime caches
        run: |
          python - <<'PY'
          from pathlib import Path

          checks = [
              ("FastF1 cache", Path("fastf1_cache")),
              ("HTTP cache", Path("data_cache/http")),
              ("Full race cache", Path("data_cache/full_races")),
              ("FIA document cache", Path("data_cache/fia-documents")),
              ("Source registry", Path("data_cache/source_registry")),
              ("Model cache", Path("models/saved_models")),
          ]
          missing = []
          for label, path in checks:
              files = sum(1 for item in path.rglob("*") if item.is_file()) if path.exists() else 0
              print(f"{label}: {'present' if path.exists() else 'missing'} ({files} files)")
              if not path.exists() or files == 0:
                  missing.append(label)
          if missing:
              print("Cache diagnostics: missing or empty caches will be rebuilt as needed:", ", ".join(missing))
          PY

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Validate briefing pipeline
        run: |
          python -m py_compile f1_briefing.py
          ruff check pitwall scripts tests
          python -m unittest discover -s ./tests -p "test_*.py" -t .
          python scripts/validate_cache_manifest.py --allow-missing
          python scripts/check_links.py

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: "frontend/package-lock.json"

      - name: Validate frontend build
        if: ${{ github.event.inputs.run_frontend_build != 'false' }}
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Run PitWall hybrid briefing
        env:
          F1_ICS_URL: ${{ secrets.F1_ICS_URL }}
          EMAIL_ENABLED: ${{ github.event.inputs.send_email || 'true' }}
          EMAIL_ADDRESS: ${{ secrets.EMAIL_ADDRESS }}
          EMAIL_APP_PASSWORD: ${{ secrets.EMAIL_APP_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}

          USER_TIMEZONE: "Asia/Kolkata"
          LOOKAHEAD_DAYS: ${{ github.event.inputs.lookahead_days || '90' }}
          FINAL_RESULTS_DELAY_HOURS: "8"
          NOTIFICATION_WINDOW_HOURS: ${{ github.event.inputs.notification_window_hours || '8' }}
          FORCE_NOTIFY: ${{ github.event.inputs.force_notify || 'false' }}
          OUTPUT_MODE: ${{ github.event.inputs.output_mode || 'auto' }}
          TARGET_SEASON: ${{ github.event.inputs.target_season || 'auto' }}
          TARGET_EVENT: ${{ github.event.inputs.target_event || '' }}
          TARGET_SESSION: ${{ github.event.inputs.target_session || '' }}

          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}

          FORCE_RETRAIN: ${{ github.event.inputs.force_retrain || 'false' }}
          FORCE_REFRESH_DATA: "false"
          CACHE_AWARE_DOWNLOADS: "true"
          PITWALL_CI: "true"
          SHOW_TRAINING_PROGRESS: "true"
          COMPARE_ACTUAL_RESULTS: "true"
          TRAINING_MODE: "auto"
          MODEL_TRAINING_MAX_SECONDS: "900"
          ENABLE_FEATURE_ABLATION: ${{ github.event.inputs.enable_feature_ablation || 'false' }}
          ENABLE_HYPERPARAMETER_SEARCH: ${{ github.event.inputs.enable_hyperparameter_search || 'false' }}
          MAX_TRAINING_RACES: "auto"
          MODEL_LIGHT_MODE: "false"
          ML_START_YEAR: "2018"
          USE_FULL_HISTORICAL_DATA: "true"
          FULL_DATA_BACKFILL_LIMIT: ${{ github.event.inputs.full_data_backfill_limit || '0' }}

          # Enabled intentionally. These sources can improve predictions when data is available.
          # If a source has not published data yet or blocks a request, f1_briefing.py should skip/fallback.
          UPGRADES_ENABLED: "true"
          F1_REGULATIONS_ENABLED: "true"
          SOURCE_DISCOVERY_ENABLED: "true"
          REFRESH_SOURCE_REGISTRY: ${{ github.event.inputs.refresh_source_registry || 'false' }}
          FIA_DOCUMENTS_ENABLED: "true"
          FIA_DOCUMENTS_BASE_URL: "https://www.fia.com/documents/championships/fia-formula-one-world-championship-14"
          FIA_DOCUMENTS_SEASON_URL_2026: "https://www.fia.com/documents/championships/fia-formula-one-world-championship-14/season/season-2026-2072"
          FIA_DOCUMENT_CACHE_DIR: "data_cache/fia-documents"
          REFRESH_FIA_DOCUMENTS: ${{ github.event.inputs.refresh_fia_documents || 'false' }}
          FORCE_REPARSE_FIA_DOCUMENTS: ${{ github.event.inputs.force_reparse_fia_documents || 'false' }}
          FORCE_REDOWNLOAD_FIA_DOCUMENTS: ${{ github.event.inputs.force_redownload_fia_documents || 'false' }}
          FIA_DOCUMENT_CACHE_TTL_MINUTES: "60"
          FIA_REQUEST_SLEEP_SECONDS: "1.0"
          MAX_FIA_DOCUMENTS_PER_RUN: "0"
          MAX_FIA_PDFS_DOWNLOAD_PER_RUN: "0"
          KEEP_FIA_PDFS: "false"
          SESSION_INGESTION_ENABLED: "true"
          SESSION_RESULT_DELAY_MINUTES: ${{ github.event.inputs.session_delay_minutes || '30' }}
          PRACTICE_RESULT_DELAY_MINUTES: "20"
          QUALIFYING_RESULT_DELAY_MINUTES: "30"
          SPRINT_QUALIFYING_RESULT_DELAY_MINUTES: "30"
          SPRINT_RESULT_DELAY_MINUTES: "45"
          RACE_RESULT_DELAY_HOURS: "8"
          SESSION_RETRY_INTERVAL_MINUTES: "20"
          MAX_SESSION_RETRIES: "8"
          FORCE_SESSION_INGEST: ${{ github.event.inputs.force_session_ingest || 'false' }}
          DRY_RUN_SESSION_INGEST: ${{ github.event.inputs.dry_run_session_ingest || 'false' }}
          USE_SOCIAL_UPGRADE_SOURCES: ${{ github.event.inputs.use_social_upgrade_sources || 'false' }}
          OPENF1_ENABLED: "true"
          OPENF1_ACCESS_TOKEN: ${{ secrets.OPENF1_ACCESS_TOKEN }}
          OPENF1_USERNAME: ${{ secrets.OPENF1_USERNAME }}
          OPENF1_PASSWORD: ${{ secrets.OPENF1_PASSWORD }}
          OPENF1_OPTIONAL_ONLY: ${{ github.event.inputs.openf1_optional_only || 'true' }}

          OFFICIAL_CALENDAR_ENABLED: "true"
          OFFICIAL_F1_CALENDAR_URL: "https://www.formula1.com/en/racing/{year}"
          FORMULA1_CALENDAR_BASE_URL: "https://www.formula1.com/en/racing"

          F1_LIVE_TIMING_STATIC_BASE: "https://livetiming.formula1.com/static"
          OPENF1_BASE: "https://api.openf1.org/v1"
          OPENF1_REQUEST_SLEEP: "0.45"
          LIVE_TIMING_ENABLED: "true"
          LIVE_STALE_AFTER_SECONDS: "60"
          F1_TIMING_RATE_LIMIT_MS: "5000"
          DISABLE_LIVE_MODE: ${{ github.event.inputs.disable_live_mode || 'false' }}
          TIMING_REPLAY_MODE_ALLOWED: "true"
          FIA_TECH_UPDATE_BASE: "https://www.fia.com/news"
          JOLPICA_REQUEST_SLEEP: "1.2"
          ENABLE_RACE_SIMULATION: "true"
          RACE_SIMULATION_RUNS: "5000"
          GITHUB_ACTIONS_RACE_SIMULATION_RUNS: "1000"
          LATEST_RUN_STATUS_PATH: "data_cache/latest-run-status.json"
          USE_LAST_VALID_CONTRACT_ON_ERROR: "true"
          FREE_MODE: "true"
          AI_FEATURES_ENABLED: "false"
          DETERMINISTIC_EXPLANATIONS_ENABLED: "true"
          LOCAL_LLM_ENABLED: "false"
          LOCAL_RAG_ENABLED: "false"
          HUGGINGFACE_SPACE_AI_ENABLED: "false"
          GITHUB_RAW_DATA_FALLBACK: "true"
          SKIP_NETWORK_TESTS: "true"

          MODEL_DIR: "models/saved_models"
          HTTP_CACHE_DIR: "data_cache/http"
          FULL_RACE_CACHE_DIR: "data_cache/full_races"
          FASTF1_CACHE_DIR: "fastf1_cache"

          # If f1_briefing.py supports this flag, it prevents the script from pushing by itself.
          # The workflow commit step below is the source of truth.
          AUTO_COMMIT_ENABLED: "false"
        run: python -u f1_briefing.py

      - name: Validate generated frontend contracts
        run: |
          python scripts/validate_contracts.py
          python scripts/validate_cache_manifest.py --allow-missing
          python scripts/check_links.py
          python scripts/check_artifact_sizes.py
          python scripts/generate_run_report.py
          python -m json.tool briefings/index.json >/dev/null
          python -m json.tool data_cache/latest-model-debug.json >/dev/null
          python -m json.tool data_cache/frontend-contract.json >/dev/null
          python -m json.tool data_cache/model-status.json >/dev/null
          python -m json.tool data_cache/backtest-history.json >/dev/null
          python -m json.tool data_cache/model_corrections.json >/dev/null
          python -m json.tool data_cache/latest-run-status.json >/dev/null
          python -m unittest discover -s ./tests -p "test_*.py" -t .

      - name: Commit generated outputs and caches
        if: success()
        run: |
          set -e

          git config user.name "Shreyansh Singhal"
          git config user.email "111811929+ShreyTriesToCode@users.noreply.github.com"

          echo "Git state after generation:"
          git status --short

          # Stage outputs first. The previous workflow failed because it tried to rebase
          # while fastf1_cache/data_cache had unstaged changes.
          git add briefings MODEL_STATUS.md RUN_REPORT.md data_cache/latest-model-debug.json 2>/dev/null || true
          git add data_cache/frontend-contract.json data_cache/model-status.json data_cache/backtest-history.json data_cache/model_corrections.json data_cache/latest-run-status.json data_cache/features data_cache/source_registry data_cache/fia-documents data_cache/mappings 2>/dev/null || true
          git add data_cache/http data_cache/full_races models/saved_models fastf1_cache 2>/dev/null || true

          if ! git diff --cached --quiet; then
            git commit -m "chore: update PitWall generated outputs" \
              --author="Shreyansh Singhal <111811929+ShreyTriesToCode@users.noreply.github.com>"
          else
            echo "No generated file changes to commit before sync."
          fi

          # Now sync with remote only after the worktree is clean.
          git fetch origin main

          if [ "$(git rev-list --count HEAD..origin/main)" -gt 0 ]; then
            echo "Remote has new commits. Rebasing local generated commits."
            if ! git rebase origin/main; then
              echo "Rebase conflict occurred. Keeping this run's generated output for generated files."
              git status --short

              for file in briefings/latest-run-status.md briefings/index.json data_cache/latest-model-debug.json data_cache/frontend-contract.json data_cache/model-status.json data_cache/backtest-history.json data_cache/model_corrections.json data_cache/latest-run-status.json MODEL_STATUS.md; do
                if [ -e "$file" ]; then
                  git checkout --ours "$file" || true
                  git add "$file" || true
                fi
              done

              git add data_cache/http data_cache/full_races models/saved_models fastf1_cache 2>/dev/null || true
              git add data_cache/source_registry data_cache/fia-documents data_cache/mappings 2>/dev/null || true

              if ! git diff --cached --quiet; then
                git commit --no-edit || true
              fi

              git rebase --continue || {
                echo "Automatic rebase recovery failed."
                git rebase --abort || true
                exit 1
              }
            fi
          else
            echo "Remote is not ahead. No rebase needed."
          fi

          if [ "$(git rev-list --count origin/main..HEAD)" -gt 0 ]; then
            git push origin HEAD:main
          else
            echo "No local commits to push."
          fi

      - name: Upload generated artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pitwall-output
          path: |
            briefings/**
            MODEL_STATUS.md
            RUN_REPORT.md
            data_cache/latest-model-debug.json
            data_cache/frontend-contract.json
            data_cache/model-status.json
            data_cache/backtest-history.json
            data_cache/model_corrections.json
            data_cache/latest-run-status.json
            data_cache/features/**
            data_cache/source_registry/**
            data_cache/fia-documents/**
            data_cache/mappings/**
            data_cache/http/**
            data_cache/full_races/**
            fastf1_cache/**
            models/saved_models/**
          if-no-files-found: ignore
