<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="420" viewBox="0 0 1400 420" role="img" aria-labelledby="title desc">
  <title id="title">PitWall timing visual</title>
  <desc id="desc">A self-hosted abstract PitWall timing visual with a stylized racing line and data panels.</desc>
  <defs>
    <linearGradient id="body" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ff271c"/>
      <stop offset=".48" stop-color="#36f1df"/>
      <stop offset="1" stop-color="#f2ca57"/>
    </linearGradient>
    <pattern id="scan" width="18" height="18" patternUnits="userSpaceOnUse">
      <path d="M0 17H18" stroke="#fff" stroke-opacity=".08"/>
    </pattern>
  </defs>
  <rect width="1400" height="420" fill="#110605"/>
  <rect width="1400" height="420" fill="url(#scan)"/>
  <path d="M74 280c105-116 210-55 308-154 95-96 229-64 309 31 80 96 211 132 356 42 88-55 190-30 279 49" fill="none" stroke="#2a110e" stroke-width="74" stroke-linecap="round"/>
  <path d="M74 280c105-116 210-55 308-154 95-96 229-64 309 31 80 96 211 132 356 42 88-55 190-30 279 49" fill="none" stroke="url(#body)" stroke-width="20" stroke-linecap="round"/>
  <g fill="#1e0d0b" stroke="#ffe2d6" stroke-opacity=".2">
    <rect x="88" y="56" width="220" height="80" rx="8"/>
    <rect x="340" y="56" width="220" height="80" rx="8"/>
    <rect x="592" y="56" width="220" height="80" rx="8"/>
    <rect x="844" y="56" width="220" height="80" rx="8"/>
  </g>
  <g fill="#fff1ec" font-family="Arial, sans-serif">
    <text x="114" y="92" font-size="16" font-weight="700" fill="#36f1df">PITWALL</text>
    <text x="114" y="118" font-size="24" font-weight="900">Race Model</text>
    <text x="366" y="92" font-size="16" font-weight="700" fill="#36f1df">GRID</text>
    <text x="366" y="118" font-size="24" font-weight="900">Full Field</text>
    <text x="618" y="92" font-size="16" font-weight="700" fill="#36f1df">SOURCE</text>
    <text x="618" y="118" font-size="24" font-weight="900">Health Checked</text>
    <text x="870" y="92" font-size="16" font-weight="700" fill="#36f1df">STRATEGY</text>
    <text x="870" y="118" font-size="24" font-weight="900">Stint Timeline</text>
  </g>
</svg>
